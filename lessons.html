<div class="card">
  <h2>Lesson 1: Greetings</h2>
  <p>你好 (Nǐ hǎo) = Hello</p>
  <p>谢谢 (Xièxiè) = Thank you</p>
  <p>再见 (Zàijiàn) = Goodbye</p>
</div>

<div class="card">
  <h2>Lesson 2: Introduce Yourself</h2>
  <p>你好，我叫 Jack</p>
  <p>Nǐ hǎo, wǒ jiào Jack</p>
  <p>Hello, my name is Jack</p>
</div>

<div class="card">
  <h2>Lesson 3: Numbers</h2>
  <p>一 (Yī) = 1</p>
  <p>二 (Èr) = 2</p>
  <p>三 (Sān) = 3</p>
</div>
